# Remote YAM environment — proxies to a RobotServer over gRPC.
#
# The server runs on the robot's local machine.  A reverse SSH tunnel
# (over Tailscale) exposes the gRPC port on the Beaker container as
# localhost:50051.
#
# Usage:
#   1. On robot machine:
#        bash scripts/start_robot_server.sh --config /path/to/yam_pi05_follower.yaml \
#            --use-follower-servers --remote-host <beaker-tailscale-ip>
#   2. On Beaker container, launch training with env=remote_yam

env_type: remote

# gRPC server URL — override via ROBOT_SERVER_URL env var.
remote_server_url: "${oc.env:ROBOT_SERVER_URL,localhost:50051}"

# gRPC transport settings (read by RemoteEnv).
grpc_max_message_size: 67108864  # 64 MB
grpc_timeout: 30.0               # seconds per RPC; scaled by chunk_size for ChunkStep
grpc_connect_timeout: 300.0      # seconds to wait for server on startup (0 = no retry)

# Task description injected into observations (can be updated by VLM planner).
task_description: ""

# Auto-reset and termination handling (read by RemoteEnv; also sent to client
# via GetSpaces but the config value here takes precedence).
auto_reset: false
ignore_terminations: true
group_size: 1

# NOTE: compress_images / jpeg_quality are server-side settings.
# Set them in the yam_pi05_follower.yaml config passed to start_robot_server.sh,
# not here.
# RemoteEnv handles both compressed and uncompressed images transparently.
# Any wrist or extra camera views exposed by the server are forwarded
# automatically via the observation keys `wrist_images` and
# `extra_view_images`.

# NOTE: max_episode_steps / control_rate_hz are NOT read from this file.
# RemoteEnv fetches them from the server at init via GetSpaces().
# Set max_episode_steps here only if the runner needs it before env init.

video_cfg:
  save_video: false
  info_on_video: true
  video_base_dir: ${runner.logger.log_path}/video/train
