# YAM bimanual robot environment configuration for PI0.5 follower servers.
#
# This is the RLinf-side counterpart to the user's known-good follower setup:
# - follower servers on localhost:1234 (right) and localhost:1235 (left)
# - 30 Hz control loop
# - 30 fps RealSense cameras at 640x360
# - raw image transport over gRPC (no JPEG compression)
#
# Use together with:
#   bash scripts/start_robot_server.sh \
#       --config examples/embodiment/config/env/yam_pi05_follower.yaml \
#       --use-follower-servers \
#       --no-tunnel

env_type: yam

total_num_envs: null

# Episode settings
# Keep the desktop-side step limit comfortably larger than the training-side
# cadence.  The *real* episode duration is set by ``episode_duration_s`` below.
max_episode_steps: 1000000
max_steps_per_rollout_epoch: 1000000

# Wall-clock episode duration in seconds. The desktop launcher can override
# this from a top-level training config so you only edit timing in one place.
episode_duration_s: ${oc.env:RLINF_EPISODE_DURATION_S,120}

# After the server-side episode timer expires, return both arms to home and
# rest there before accepting a fresh restart from home. Set to 0 to restart
# immediately, or override to any number of minutes you want.
episode_cooldown_minutes: ${oc.env:RLINF_EPISODE_COOLDOWN_MINUTES,1}

# Robot control
control_rate_hz: 30.0

# Camera / image settings
img_height: 360
img_width: 640
main_camera: "cam_top"
wrist_cameras: ["cam_left", "cam_right"]

# Keep images uncompressed so the policy sees the closest possible input to
# the original local follower pipeline.
compress_images: False

# Human-readable task description injected into observations (used by VLA models).
task_description: ""

# Set to True to run without real hardware (returns zero observations).
is_dummy: False

# Auto-reset and termination handling (matches RealWorldEnv contract).
auto_reset: False
ignore_terminations: True
# Let training start from the robot's current pose. Later resets (for the
# 40-minute rest window) still return to startup home.
skip_home_on_initial_reset: True
# On clean shutdown or interrupt, move both arms back to the captured startup
# home pose before closing the robot clients.
return_home_on_close: True

# TOPReward dense reward configuration.
top_reward_enabled: False
top_reward_max_frames: 16

robot_cfgs:
  left: ["examples/embodiment/config/env/robot_clients/yam_follower_left.yaml"]
  right: ["examples/embodiment/config/env/robot_clients/yam_follower_right.yaml"]

camera_cfgs:
  cam_right:
    _target_: yam_realtime.sensors.cameras.camera.CameraNode
    camera:
      _target_: rlinf.envs.yam.realsense_camera.RealsenseCamera
      serial_number: "128422272697"
      resolution: [640, 360]
      fps: 30
  cam_top:
    _target_: yam_realtime.sensors.cameras.camera.CameraNode
    camera:
      _target_: rlinf.envs.yam.realsense_camera.RealsenseCamera
      serial_number: "215222073684"
      resolution: [640, 360]
      fps: 30
  cam_left:
    _target_: yam_realtime.sensors.cameras.camera.CameraNode
    camera:
      _target_: rlinf.envs.yam.realsense_camera.RealsenseCamera
      serial_number: "218622275075"
      resolution: [640, 360]
      fps: 30

video_cfg:
  save_video: False
  info_on_video: True
  video_base_dir: ${runner.logger.log_path}/video/train
