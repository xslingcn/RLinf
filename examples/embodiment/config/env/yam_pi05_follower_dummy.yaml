# Camera-less YAM follower config for local dummy RemoteEnv smoke tests.
#
# The RobotServer is launched with --dummy, which sets is_dummy=True. This
# config also removes camera_cfgs so YAMEnv does not try to open RealSense
# devices while still producing black fallback images.

env_type: yam

total_num_envs: null

max_episode_steps: 10000
max_steps_per_rollout_epoch: 10000

control_rate_hz: 30.0

img_height: 360
img_width: 640
main_camera: "cam_top"
wrist_cameras: []

compress_images: false

task_description: ""

is_dummy: true

auto_reset: false
ignore_terminations: true

top_reward_enabled: false
top_reward_max_frames: 16

robot_cfgs:
  left: ["examples/embodiment/config/env/robot_clients/yam_follower_left.yaml"]
  right: ["examples/embodiment/config/env/robot_clients/yam_follower_right.yaml"]

camera_cfgs: null

video_cfg:
  save_video: false
  info_on_video: true
  video_base_dir: ${runner.logger.log_path}/video/train
