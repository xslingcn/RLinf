# YAM bimanual robot – PPO training with π₀.5 (OpenPI) policy, direct YAMEnv on desktop, and TOPReward.
#
# Algorithm: PPO with GAE advantage and value head.
# Reward:    TOPReward dense progress signal (Qwen3-VL-8B).
#
# Difference from yam_ppo_openpi.yaml:
#   - Desktop joins the Ray cluster as node_rank 1 (no RobotServer / gRPC needed).
#   - EnvWorker runs YAMEnv directly on the desktop via a Ray actor.
#   - num_nodes: 2 (Beaker at rank 0, desktop at rank 1).
#
# Hardware topology:
#   Beaker node (rank 0, 3 GPUs):
#     GPU 0 – actor (π₀.5 FSDP training with value head)
#     GPU 1 – rollout (π₀.5 inference)
#     GPU 2 – VLMPlannerWorker (Qwen3-VL-8B for TOPReward)
#   Desktop (rank 1, CPU only):
#     EnvWorker running YAMEnv directly (CAN bus + cameras)
#
# Usage:
#   1. Submit Beaker job (Ray head, idle):
#        bash scripts/submit_yam_beaker_cluster.sh --config yam_ppo_openpi_desktop
#   2. Desktop joins and runs training:
#        bash scripts/join_beaker_cluster.sh \
#            --head-ip <beaker-tailscale-ip> \
#            --config yam_ppo_openpi_desktop \
#            --model-path thomas0829/folding_towel_pi05 \
#            --task "fold the towel"
#
# Prerequisites:
#   pip install "transformers @ git+https://github.com/huggingface/transformers.git@main"
#   pip install qwen-vl-utils accelerate torchvision pillow  (on Beaker)
#   huggingface-cli download Qwen/Qwen3-VL-8B
#   pip install yam_realtime  (on desktop)

defaults:
  - env/yam@env.train
  - env/yam@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 2
  component_placement:
    actor:
      node_group: "gpu"
      placement: 0
    rollout:
      node_group: "gpu"
      placement: 1   # π₀.5 requires a dedicated GPU; cannot share GPU 0 with actor
    env:
      node_group: "desktop"
      placement: 0   # YAMEnv runs directly on desktop CPU (no gRPC)
  node_groups:
    - label: "gpu"
      node_ranks: 0       # Beaker node
    - label: "beaker_vlm"
      node_ranks: 0       # VLMPlannerWorker placement group on the Beaker node
    - label: "desktop"
      node_ranks: 1       # Desktop node (joined via join_beaker_cluster.sh)

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "yam_ppo_openpi_desktop"
    logger_backends: ["tensorboard"]

  max_epochs: 2000
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: 50

  resume_dir: null
  ckpt_path: null

  weight_sync_interval: 1

algorithm:
  normalize_advantages: False
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0

  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: chunk_level

  update_epoch: 5
  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"

  bootstrap_type: always
  kl_beta: 0.0    # NOTE: not used by EmbodiedFSDPActor (KL penalty only applies to reasoning tasks)
  entropy_bonus: 0.005
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: False
  rewards_lower_bound: 0.0
  rewards_upper_bound: 1.0

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 1
    max_episode_steps: 100
    max_steps_per_rollout_epoch: 60
    control_rate_hz: 10.0

    task_description: "bimanual pick and place"

    # Set to True to run without real hardware (returns zero observations).
    is_dummy: False

    # Robot arm configs — required when is_dummy: False.
    # Paths to yam_realtime YAML configs for each arm.
    robot_cfgs:
      left: null   # e.g. ["/path/to/yam_realtime/robot_configs/yam/left.yaml"]
      right: null  # e.g. ["/path/to/yam_realtime/robot_configs/yam/right.yaml"]

    # Camera configs — optional.
    camera_cfgs: null

    # Enable TOPReward dense progress signal.
    # EnvWorker calls VLMPlannerWorker (on Beaker GPU 2) via Ray RPC.
    top_reward_enabled: True
    top_reward_max_frames: 16
    top_reward_instruction_source: initial_task

    # Subtask planning disabled — VLM is used for TOPReward only.
    subtask_interval: 0

  eval:
    total_num_envs: 1
    max_episode_steps: 100
    max_steps_per_rollout_epoch: 60
    control_rate_hz: 10.0
    task_description: "bimanual pick and place"
    is_dummy: False
    robot_cfgs:
      left: null
      right: null
    camera_cfgs: null

# VLM planner: Qwen3-VL-8B for TOPReward scoring only (no subtask planning).
vlm_planner:
  model_path: "Qwen/Qwen3-VL-8B-Instruct"
  backend: "transformers"
  dtype: "bfloat16"
  transformers_runtime_path: ".qwen3_runtime"
  # Optional explicit placement override. By default RLinf chooses GPU 2 here
  # because actor and rollout occupy GPUs 0 and 1 on the same node.
  # placement: 2
  # Optional node-group override for the planner. Defaults to "beaker_vlm".
  # node_group: "beaker_vlm"
  max_new_tokens_subtask: 64
  max_new_tokens_reward: 16
  success_threshold: 0.5
  top_reward_enabled: True
  top_reward_max_frames: 16
  reward_scale: 1.0

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1

  collect_transitions: True
  collect_prev_infos: True

  model:
    model_path: "thomas0829/folding_towel_pi05"
    precision: ${actor.model.precision}

  enable_torch_compile: False
  enable_cuda_graph: False

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"

  micro_batch_size: 2
  global_batch_size: 2
  seed: 42
  enable_offload: False

  model:
    model_path: "thomas0829/folding_towel_pi05"
    model_type: "openpi"
    precision: "bf16"
    add_value_head: True
    num_action_chunks: 30
    action_dim: 14
    num_steps: 10
    openpi:
      value_after_vlm: True
      value_vlm_mode: mean_token
      config_name: "pi05_yam_follower"
      num_images_in_input: 3
      discrete_state_input: True
      noise_method: "flow_sde"
      action_horizon: 30
      noise_params: [0.16, 0.12, 200]
      joint_logprob: True

  optim:
    lr: 5.0e-6
    value_lr: 1.55e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    clip_grad: 1.0
    weight_decay: 0.01
    lr_scheduler: torch_constant
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False
  reward_type: top_reward

critic:
  use_critic_model: False
